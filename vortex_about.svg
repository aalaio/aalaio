<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="black"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Generating 20+ particles in a spiral pattern -->
    <circle cx="100" cy="100" r="1" fill="white">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite"/>
    </circle>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
      <circle cx="130" cy="100" r="1.5" fill="white"/><circle cx="70" cy="100" r="1.2" fill="white"/>
      <circle cx="100" cy="130" r="1.8" fill="white"/><circle cx="100" cy="70" r="1" fill="white"/>
      <circle cx="121" cy="121" r="1.3" fill="white"/><circle cx="79" cy="79" r="1.5" fill="white"/>
      <circle cx="121" cy="79" r="1" fill="white"/><circle cx="79" cy="121" r="1.2" fill="white"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite"/>
      <circle cx="150" cy="100" r="1" fill="white" opacity="0.6"/><circle cx="50" cy="100" r="1" fill="white" opacity="0.6"/>
      <circle cx="100" cy="150" r="1" fill="white" opacity="0.6"/><circle cx="100" cy="50" r="1" fill="white" opacity="0.6"/>
    </g>
    <!-- Complex spiral paths -->
    <path d="M100 100 Q 130 70 160 100 T 200 100" stroke="white" stroke-width="0.5" fill="none" opacity="0.3">
       <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
    </path>
    <path d="M100 100 Q 70 130 40 100 T 0 100" stroke="white" stroke-width="0.5" fill="none" opacity="0.3">
       <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="25s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
