<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  
  <!-- Header Bar -->
  <rect x="0" y="0" width="400" height="40" rx="8" fill="#161b22"/>
  <circle cx="20" cy="20" r="5" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="5" fill="#27c93f"/>
  <text x="200" y="25" font-family="sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Sales_Performance_Dashboard.twb</text>

  <!-- Dashboard Mockup Elements -->
  <!-- KPIS -->
  <rect x="20" y="60" width="110" height="50" rx="4" fill="#21262d"/>
