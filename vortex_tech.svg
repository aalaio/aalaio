<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="black"/>
  <g transform="translate(100,100)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      <path d="M0,0 C20,-40 60,-40 80,0 C60,40 20,40 0,0" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
      <path d="M0,0 C-20,40 -60,40 -80,0 C-60,-40 -20,-40 0,0" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="12s" repeatCount="indefinite"/>
      <path d="M0,0 C20,-40 60,-40 80,0 C60,40 20,40 0,0" stroke="white" stroke-width="1" fill="none" opacity="0.6"/>
      <path d="M0,0 C-20,40 -60,40 -80,0 C-60,-40 -20,-40 0,0" stroke="white" stroke-width="1" fill="none" opacity="0.6"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="240" to="600" dur="16s" repeatCount="indefinite"/>
      <path d="M0,0 C20,-40 60,-40 80,0 C60,40 20,40 0,0" stroke="white" stroke-width="0.5" fill="none" opacity="0.4"/>
      <path d="M0,0 C-20,40 -60,40 -80,0 C-60,-40 -20,-40 0,0" stroke="white" stroke-width="0.5" fill="none" opacity="0.4"/>
    </g>
    <!-- Add particles -->
    <circle cx="50" cy="0" r="2" fill="white">
       <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-70" cy="20" r="1.5" fill="white">
       <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
