<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist Monochromatic Globe -->
  <g fill="none" stroke="white" stroke-width="2" stroke-opacity="0.8">
    <!-- Outer Circle -->
    <circle cx="200" cy="200" r="150" />
    
    <!-- Longitude Lines -->
    <ellipse cx="200" cy="200" rx="60" ry="150" />
    <ellipse cx="200" cy="200" rx="110" ry="150" />
    <line x1="200" y1="50" x2="200" y2="350" />
    
    <!-- Latitude Lines -->
    <line x1="50" y1="200" x2="350" y2="200" />
    <path d="M70 120 Q 200 100 330 120" />
    <path d="M70 280 Q 200 300 330 280" />
    
    <!-- Abstract Continents (Minimalist Blobs) -->
    <path d="M150 100 Q 180 80 220 110 T 250 150 Q 230 180 180 160 Z" fill="white" fill-opacity="0.2" stroke="none" />
    <path d="M120 220 Q 140 200 170 230 T 150 280 Q 130 260 120 220 Z" fill="white" fill-opacity="0.1" stroke="none" />
  </g>
  <!-- Background atmosphere -->
  <circle cx="200" cy="200" r="170" stroke="white" stroke-opacity="0.05" stroke-width="1" />
</svg>
