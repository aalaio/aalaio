<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist Strategic Data Chart (Bar Chart + Trend Arrow) -->
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bar Chart Base -->
    <rect x="80" y="240" width="30" height="80" stroke-width="8" stroke-opacity="0.4" />
    <rect x="130" y="200" width="30" height="120" stroke-width="8" stroke-opacity="0.6" />
    <rect x="180" y="260" width="30" height="60" stroke-width="8" stroke-opacity="0.3" />
    <rect x="230" y="180" width="30" height="140" stroke-width="8" stroke-opacity="0.8" />
    <rect x="280" y="220" width="30" height="100" stroke-width="8" stroke-opacity="0.5" />
    <rect x="330" y="160" width="30" height="160" stroke-width="8" stroke-opacity="1" />
    
    <!-- Upward Trend Arrow -->
    <path d="M80 200 L160 140 L230 170 L340 60" stroke-width="12" stroke-opacity="1" />
    <path d="M290 60 L340 60 L340 110" stroke-width="12" stroke-opacity="1" />
  </g>
  <!-- Global atmosphere/glow -->
  <circle cx="200" cy="200" r="180" stroke="white" stroke-opacity="0.05" stroke-width="1" />
</svg>
