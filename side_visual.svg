<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Solid Monochrome Pixel-Art Dino on Skateboard (Replicating User Image) -->
  <g fill="white">
    <!-- Head & Snout -->
    <rect x="180" y="80" width="80" height="20" />
    <rect x="180" y="100" width="100" height="60" />
    <!-- Eye cutout -->
    <rect x="250" y="110" width="10" height="10" fill="black" />
    
    <!-- Torso -->
    <rect x="130" y="160" width="80" height="80" />
    <rect x="110" y="180" width="20" height="60" />
    <rect x="90" y="200" width="20" height="40" />
    <rect x="70" y="220" width="20" height="20" />
    
    <!-- Legs -->
    <rect x="140" y="240" width="20" height="20" />
    <rect x="190" y="240" width="20" height="20" />
    
    <!-- Arm -->
    <rect x="210" y="180" width="20" height="10" />
    
    <!-- Skateboard (inclined) -->
    <g transform="rotate(-30, 200, 300)">
      <rect x="100" y="290" width="200" height="15" />
      <rect x="130" y="305" width="20" height="20" rx="10" />
      <rect x="250" y="305" width="20" height="20" rx="10" />
    </g>
    
    <!-- Cactus -->
    <rect x="280" y="280" width="10" height="80" />
    <rect x="260" y="300" width="20" height="10" />
    <rect x="260" y="280" width="10" height="30" />
    <rect x="290" y="310" width="20" height="10" />
    <rect x="300" y="290" width="10" height="30" />
    
    <!-- Environment -->
    <rect x="40" y="280" width="60" height="10" opacity="0.5" />
    <rect x="320" y="220" width="40" height="5" opacity="0.3" />
  </g>
</svg>
