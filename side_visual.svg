<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft Glow Filter (Neon/Screen Effect) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background (Black) - Although usually handled by the README container, we ensure it's here for preview -->
  <rect width="400" height="400" fill="black" />

  <g filter="url(#glow)">
    <!-- 7-Bar Histogram (Rounded Corners, Fluctuating Heights) -->
    <!-- Heights: media (100), alta (180), media-baja (70), baja (40), alta (180), media-alta (140), alta (180) -->
    <rect x="70" y="220" width="25" height="100" rx="4" fill="white" fill-opacity="0.8" /> <!-- Media -->
    <rect x="110" y="140" width="25" height="180" rx="4" fill="white" fill-opacity="0.9" /> <!-- Alta -->
    <rect x="150" y="250" width="25" height="70" rx="4" fill="white" fill-opacity="0.6" /> <!-- Media-baja -->
    <rect x="190" y="280" width="25" height="40" rx="4" fill="white" fill-opacity="0.4" /> <!-- Baja -->
    <rect x="230" y="140" width="25" height="180" rx="4" fill="white" fill-opacity="0.9" /> <!-- Alta -->
    <rect x="270" y="180" width="25" height="140" rx="4" fill="white" fill-opacity="0.8" /> <!-- Media-alta -->
    <rect x="310" y="140" width="25" height="180" rx="4" fill="white" fill-opacity="1.0" /> <!-- Alta -->

    <!-- Trend Line (Superimposed, Broken Line with Arrow) -->
    <!-- Starts mid-left, slight dip (center), sharp rise (top-right) -->
    <path d="M70 200 L140 160 L195 230 L280 130 L340 70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Open Triangle Arrowhead -->
    <path d="M300 75 L340 70 L345 110" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
