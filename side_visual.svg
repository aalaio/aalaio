<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Highly recognizable cat silhouette looking up and left -->
  <g fill="white" stroke="white" stroke-width="1">
    <!-- Body and Head connected in a more cat-like shape -->
    <path d="M280 380 
             C 280 320, 240 250, 200 200 
             C 170 160, 150 140, 150 100 
             C 150 70, 170 50, 200 50 
             L 170 20 
             L 155 55 
             C 140 70, 130 90, 130 120 
             C 130 160, 150 200, 170 250 
             C 190 300, 180 340, 140 380 
             Z" />
    <!-- Secondary Ear for depth -->
    <path d="M205 55 L 225 30 L 215 65 Z" />
    <!-- Tail (Classic cat curve) -->
    <path d="M280 380 C 320 380, 350 350, 350 300 C 350 270, 330 250, 310 250" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
