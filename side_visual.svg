<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist Astronaut Floating (Data Themed) -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Helmet -->
    <path d="M150 100 Q 200 50 250 100 T 250 160 Q 200 180 150 160 T 150 100 Z" stroke-opacity="0.8"/>
    <!-- Visor -->
    <rect x="170" y="100" width="60" height="30" rx="15" stroke-opacity="0.5"/>
    <!-- Suit Body -->
    <path d="M160 160 Q 200 180 240 160 L 260 250 H 140 Z" stroke-opacity="0.6"/>
    <!-- Data Crystal (Interacting) -->
    <path d="M220 220 L 240 200 L 260 220 L 240 240 Z" stroke-opacity="0.9"/>
    <!-- Floating particles -->
    <circle cx="100" cy="100" r="1" fill="white" fill-opacity="0.3"/>
    <circle cx="300" cy="300" r="1" fill="white" fill-opacity="0.3"/>
  </g>
</svg>
