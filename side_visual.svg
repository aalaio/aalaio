<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- High-Fidelity Monochromatic Globe (Replicating User Image) -->
  <g stroke="white" stroke-width="2" fill="none">
    <!-- Main Sphere Outline -->
    <circle cx="200" cy="200" r="160" />
    
    <!-- Longitude Lines (Vertical Curves) -->
    <path d="M200 40 L200 360" stroke-opacity="0.8" />
    <ellipse cx="200" cy="200" rx="60" ry="160" stroke-opacity="0.6" />
    <ellipse cx="200" cy="200" rx="110" ry="160" stroke-opacity="0.4" />
    
    <!-- Latitude Lines (Horizontal Curves) -->
    <line x1="40" y1="200" x2="360" y2="200" stroke-opacity="0.8" />
    <path d="M60 120 Q 200 100 340 120" stroke-opacity="0.5" />
    <path d="M60 280 Q 200 300 340 280" stroke-opacity="0.5" />
    <path d="M100 65 Q 200 55 300 65" stroke-opacity="0.3" />
    <path d="M100 335 Q 200 345 300 335" stroke-opacity="0.3" />
    
    <!-- Landmasses (Solid White Shapes for Contrast) -->
    <path d="M140 100 C 160 80, 220 70, 240 110 C 260 140, 230 180, 180 170 C 150 160, 130 130, 140 100 Z" fill="white" fill-opacity="0.9" stroke="none" />
    <path d="M180 200 C 210 190, 250 210, 240 250 C 230 280, 190 290, 170 260 C 160 230, 160 210, 180 200 Z" fill="white" fill-opacity="0.7" stroke="none" />
    <path d="M100 180 C 120 170, 130 190, 120 210 C 110 230, 90 220, 100 180 Z" fill="white" fill-opacity="0.5" stroke="none" />
  </g>
</svg>
