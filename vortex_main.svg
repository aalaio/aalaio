<svg width="250" height="250" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="250" height="250" fill="black"/>
  <!-- Wireframe Hand (Simplified but refined) -->
  <g stroke="white" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M125 220 C125 200 110 180 100 150 C90 120 100 90 115 80 C120 75 130 75 135 80 C150 90 160 120 150 150 C140 180 125 200 125 220 Z"/>
    <path d="M100 150 L150 150 M105 130 L145 130 M110 110 L140 110" stroke-opacity="0.3"/>
    <path d="M125 80 V50" stroke-width="2">
       <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Swirling Vortex at the focal point -->
  <g transform="translate(125,40)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" additive="sum"/>
    <circle cx="0" cy="0" r="5" fill="white">
       <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M-20,0 A20,20 0 0,1 20,0" stroke="white" stroke-width="2" opacity="0.8"/>
    <path d="M-30,0 A30,30 0 0,0 30,0" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <path d="M-40,0 A40,40 0 0,1 40,0" stroke="white" stroke-width="1" opacity="0.4"/>
    <!-- Floating dots around vortex -->
    <circle cx="15" cy="15" r="2" fill="white"/>
    <circle cx="-15" cy="-15" r="2" fill="white"/>
    <circle cx="20" cy="-10" r="1.5" fill="white"/>
  </g>
</svg>
