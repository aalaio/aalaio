  <path d="M0 250 Q 200 180 400 240 T 900 200 T 1400 260 T 1920 220 L 1920 420 L 0 420 Z" fill="#161b22"/>
  <path d="M0 280 Q 250 200 500 290 T 1100 220 T 1500 280 T 1920 240 L 1920 420 L 0 420 Z" fill="#21262d"/>
  <path d="M-50 350 Q 300 260 650 360 T 1300 270 T 1950 380 L 1950 420 L -50 420 Z" fill="#30363d"/>
  
  <!-- Glowing River / Path in center -->
