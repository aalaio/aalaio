  <text x="960" y="150" font-family="'Courier New', Courier, monospace" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="4">Welcome to Ariel's GitHub</text>
  <text x="960" y="210" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="normal" fill="#8b949e" text-anchor="middle" letter-spacing="8">&lt; / &gt;</text>
</svg>
