  <circle cx="450" cy="120" r="1" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="1200" cy="90" r="2" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="1600" cy="150" r="1.5" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="800" cy="50" r="1" fill="#ffffff" fill-opacity="0.6"/>
  <circle cx="1800" cy="100" r="2" fill="#ffffff" fill-opacity="0.3"/>

