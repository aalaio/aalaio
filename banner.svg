<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky_grad" x1="640" y1="0" x2="640" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1A1A"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="mtn_grad_1" x1="640" y1="180" x2="640" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111111"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="mtn_grad_2" x1="640" y1="220" x2="640" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080808"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="320" fill="url(#sky_grad)"/>
  
  <!-- Subtle Stars -->
  <circle cx="200" cy="50" r="1" fill="white" fill-opacity="0.3"/>
  <circle cx="1100" cy="80" r="0.8" fill="white" fill-opacity="0.2"/>
  <circle cx="640" cy="30" r="1.2" fill="white" fill-opacity="0.4"/>
  <circle cx="400" cy="120" r="0.5" fill="white" fill-opacity="0.1"/>

  <!-- Back Mountains/Dunes -->
  <path d="M0 240 Q 320 180 640 240 T 1280 220 V 320 H 0 Z" fill="url(#mtn_grad_1)"/>
  
  <!-- Front Mountains/Dunes -->
  <path d="M-50 280 Q 400 220 800 280 T 1330 260 V 320 H -50 Z" fill="url(#mtn_grad_2)"/>
  
  <!-- Centered Terminal Window (Enlarged for Maximum Space) -->
  <g transform="translate(240, 40)">
    <rect width="800" height="240" rx="12" fill="#000000" fill-opacity="0.9" stroke="#444444" stroke-width="1.5"/>
    <!-- Terminal Header -->
    <rect width="800" height="40" rx="4" fill="#111111"/>
    <circle cx="25" cy="20" r="6" fill="#333333"/>
    <circle cx="50" cy="20" r="6" fill="#333333"/>
    <circle cx="75" cy="20" r="6" fill="#333333"/>
    <text x="400" y="26" font-family="monospace" font-size="14" fill="#666666" text-anchor="middle" letter-spacing="2">terminal - ssh</text>
    
    <!-- Title (Enlarged) -->
    <text x="400" y="125" font-family="monospace" font-size="52" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">ARIEL</text>
    <text x="400" y="165" font-family="monospace" font-size="18" fill="#AAAAAA" text-anchor="middle" letter-spacing="2">DATA STRATEGY CONSULTANT</text>
    <text x="400" y="200" font-family="monospace" font-size="14" fill="#666666" text-anchor="middle">&gt; translating behavior into ROI_</text>
    <text x="400" y="225" font-family="monospace" font-size="20" fill="#333333" text-anchor="middle">&lt; / &gt;</text>
  </g>
</svg>
