<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="black"/>
  <g transform="translate(100,100)">
    <rect x="-30" y="-30" width="60" height="60" stroke="white" stroke-width="2" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-45" y="-45" width="90" height="90" stroke="white" stroke-width="1.5" fill="none" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="45" to="405" dur="10s" repeatCount="indefinite"/>
    </rect>
    <rect x="-60" y="-60" width="120" height="120" stroke="white" stroke-width="1" fill="none" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="90" to="450" dur="15s" repeatCount="indefinite"/>
    </rect>
    <!-- Data points -->
    <rect x="70" y="-10" width="4" height="4" fill="white">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7s" repeatCount="indefinite"/>
    </rect>
    <rect x="-80" y="20" width="3" height="3" fill="white">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
