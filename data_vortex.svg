<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="vortexGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hand Wireframe (Simplified) -->
  <g stroke="white" stroke-width="0.8" stroke-opacity="0.4">
    <path d="M110 180C110 180 100 170 95 150C90 130 95 110 105 100C105 100 105 80 110 60" stroke-opacity="0.6"/>
    <path d="M110 60L108 80L105 100" stroke-opacity="0.8" stroke-width="1.2"/>
    <path d="M110 180C110 180 120 170 125 150C130 130 125 110 115 100C115 100 115 80 110 60" stroke-opacity="0.6"/>
    <!-- Wrist area -->
    <path d="M95 180H125" stroke-opacity="0.2"/>
    <path d="M98 170H122" stroke-opacity="0.2"/>
    <!-- Wireframe grid effect on hand -->
    <path d="M100 160L120 160M102 140L118 140M105 120L115 120" stroke-opacity="0.1"/>
    <path d="M110 180V100" stroke-opacity="0.1"/>
  </g>

  <!-- Vortex / Galaxy Center -->
  <g filter="url(#vortexGlow)">
    <circle cx="110" cy="55" r="4" fill="white">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Rotating Spirals -->
    <g transform="translate(110, 55)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite" />
        <circle cx="15" cy="0" r="1" fill="white" fill-opacity="0.6"/>
        <circle cx="25" cy="15" r="0.8" fill="white" fill-opacity="0.4"/>
        <circle cx="-10" cy="20" r="1.2" fill="white" fill-opacity="0.5"/>
        <circle cx="-30" cy="-10" r="0.7" fill="white" fill-opacity="0.3"/>
        <circle cx="5" cy="-25" r="1" fill="white" fill-opacity="0.4"/>
      </g>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="12s" repeatCount="indefinite" />
        <circle cx="40" cy="10" r="0.8" fill="white" fill-opacity="0.2"/>
        <circle cx="-20" cy="-35" r="1" fill="white" fill-opacity="0.3"/>
        <circle cx="30" cy="-40" r="0.6" fill="white" fill-opacity="0.1"/>
        <circle cx="-45" cy="25" r="0.9" fill="white" fill-opacity="0.2"/>
      </g>
    </g>
  </g>

  <!-- Pulsing Data Particles -->
  <g fill="white">
    <circle cx="80" cy="40" r="1" fill-opacity="0.2">
      <animate attributeName="cy" values="40;35;40" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="140" cy="70" r="0.8" fill-opacity="0.1">
      <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="100" cy="20" r="1.2" fill-opacity="0.3">
      <animate attributeName="r" values="1;1.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
