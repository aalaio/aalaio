<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="black"/>
  <circle cx="100" cy="100" r="10" stroke="white" stroke-width="2" fill="none">
    <animate attributeName="r" from="10" to="90" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="1" to="0" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="100" r="10" stroke="white" stroke-width="1.5" fill="none">
    <animate attributeName="r" from="10" to="90" dur="3s" begin="1s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="1" to="0" dur="3s" begin="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="100" r="10" stroke="white" stroke-width="1" fill="none">
    <animate attributeName="r" from="10" to="90" dur="3s" begin="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="1" to="0" dur="3s" begin="2s" repeatCount="indefinite" />
  </circle>
  <!-- Rotating core dots -->
  <g transform="translate(100,100)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite" additive="sum"/>
    <circle cx="20" cy="0" r="3" fill="white"/>
    <circle cx="-20" cy="0" r="3" fill="white"/>
    <circle cx="0" cy="20" r="3" fill="white"/>
    <circle cx="0" cy="-20" r="3" fill="white"/>
  </g>
</svg>
